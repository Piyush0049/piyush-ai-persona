name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Navigate to application folder (defaulting to user home dir)
            # Ensure git is installed on the host first
            if ! command -v git &> /dev/null; then
              echo "git not found. Installing git..."
              sudo dnf install -y git || sudo yum install -y git
            fi

            PROJECT_DIR="/home/${{ secrets.EC2_USERNAME }}/rag_project_system"
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "Project directory not found. Cloning repository..."
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git "$PROJECT_DIR"
            fi
            
            cd "$PROJECT_DIR"
            git pull origin main
            
            if [ ! -z "${{ secrets.ENV_FILE_CONTENT }}" ]; then
              echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
            fi
            
            if [ ! -z "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" ]; then
              echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" > google_credentials.json
            fi
            
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
