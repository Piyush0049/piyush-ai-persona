name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Navigate to application folder (defaulting to user home dir)
            PROJECT_DIR="/home/${{ secrets.EC2_USERNAME }}/rag_project_system"
            if [ -d "$PROJECT_DIR" ]; then
              cd "$PROJECT_DIR"
              # Pull the latest changes
              git pull origin main
              
              # Re-create the .env file from secrets if provided
              if [ ! -z "${{ secrets.ENV_FILE_CONTENT }}" ]; then
                echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
              fi
              
              # Run the deployment shell script
              chmod +x scripts/deploy.sh
              ./scripts/deploy.sh
            else
              echo "Error: Project directory $PROJECT_DIR not found on EC2 instance."
              echo "Please clone the repository to $PROJECT_DIR on your EC2 instance first."
              exit 1
            fi
