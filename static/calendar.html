<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Interview - Piyush Joshi</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="alternate icon" href="/static/favicon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-primary: #131415;
            --bg-secondary: #191a1c;
            --bg-glass: #191a1c;
            --border-glass: #242628;
            --accent: #19a186;
            --accent-hover: #158b73;
            --accent-glow: rgba(25, 161, 134, 0.15);
            --text-main: #e8eaed;
            --text-muted: #9aa0a6;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 600px;
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .page-header p {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .calendar-widget-full {
            background: var(--bg-secondary);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 24px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-glass);
        }

        .calendar-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
        }

        .calendar-nav-btn {
            background: transparent;
            border: 1px solid var(--border-glass);
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calendar-nav-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
            color: var(--accent);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .calendar-day-header {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            padding: 8px 0;
            letter-spacing: 0.5px;
        }

        .calendar-day-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }

        .calendar-day-cell.empty {
            background: transparent;
        }

        .calendar-day-cell.past {
            color: #444;
            cursor: not-allowed;
        }

        .calendar-day-cell.clickable {
            cursor: pointer;
            color: var(--text-main);
        }

        .calendar-day-cell.clickable:hover {
            background: rgba(25, 161, 134, 0.1);
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .calendar-day-cell.today {
            background: rgba(25, 161, 134, 0.15);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 700;
        }

        .calendar-day-cell.selected {
            background: var(--accent) !important;
            color: white !important;
            font-weight: 700;
            transform: scale(1.1);
        }

        .time-slots-section {
            padding-top: 24px;
            border-top: 1px solid var(--border-glass);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .time-slots-header {
            margin-bottom: 16px;
        }

        .time-slots-header h4 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .selected-date-display {
            font-size: 13px;
            color: var(--text-muted);
        }

        .time-slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 24px;
        }

        .time-slot-btn {
            background: rgba(25, 161, 134, 0.05);
            border: 1px solid rgba(25, 161, 134, 0.15);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .time-slot-btn:hover {
            background: rgba(25, 161, 134, 0.15);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .time-slot-btn.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: 600;
        }

        .loading-slots, .no-slots, .error-slots {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .no-slots, .error-slots {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .booking-form-section {
            padding-top: 24px;
            border-top: 1px solid var(--border-glass);
            animation: fadeIn 0.3s ease;
        }

        .booking-form-section h4 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .selected-time-display {
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 20px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
        }

        .booking-submit-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .booking-submit-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .booking-submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .booking-success {
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 0.5s ease;
        }

        .booking-success h3 {
            font-size: 24px;
            font-weight: 700;
            color: #10b981;
            margin: 16px 0 8px 0;
        }

        .booking-success p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .booking-time {
            font-size: 18px !important;
            color: var(--text-main) !important;
            font-weight: 600 !important;
            margin: 16px 0 !important;
        }

        .booking-details {
            font-size: 12px !important;
            color: var(--text-muted) !important;
        }

        .booking-details code {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--accent);
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .back-link {
            margin-top: 24px;
            text-align: center;
        }

        .back-link a {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }

        .back-link a:hover {
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 24px;
            }

            .calendar-grid {
                gap: 4px;
            }

            .time-slots-grid {
                grid-template-columns: 1fr 1fr;
            }

            .calendar-day-cell {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>Schedule an Interview</h1>
        <p>Select a date and time slot to book a technical interview with Piyush Joshi. All times are in IST (UTC+5:30).</p>
    </div>

    <div id="calendar-widget-container"></div>

    <div class="back-link">
        <a href="/">
            <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i>
            <span>Back to Chat</span>
        </a>
    </div>

    <script src="/static/calendar.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
